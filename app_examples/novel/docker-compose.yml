services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=novel
      - POSTGRES_PASSWORD=novel
      - POSTGRES_DB=novel
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - novel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./stories:/app/stories:ro
      - ../../examples_python:/app/examples_python:ro
    environment:
      - STORIES_DIR=/app/stories
      - DATABASE_URL=postgresql://novel:novel@db:5432/novel
    networks:
      - novel-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./web_ui
    volumes:
      - ./stories:/usr/share/nginx/html/stories:ro
    ports:
      - "8060:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - novel-net

volumes:
  pgdata:

networks:
  novel-net: