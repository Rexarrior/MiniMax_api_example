services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novelpassword
      POSTGRES_DB: novel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://novel:novelpassword@postgres:5432/novel
      STORIES_DIR: /app/stories
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./stories:/app/stories:ro
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
