# Copy to config.yaml and edit, or rely on MINIMAX_API_KEY in repo-root .env (see run_websearch_bot.py).
# Docs: https://platform.minimax.io/docs/solutions/mini-agent

api_key: "YOUR_API_KEY_HERE"
api_base: "https://api.minimax.io"
model: "MiniMax-M2.7"
provider: "anthropic"

retry:
  enabled: true
  max_retries: 3
  initial_delay: 1.0
  max_delay: 60.0
  exponential_base: 2.0

max_steps: 30
workspace_dir: "./workspace"
system_prompt_path: "system_prompt.md"

tools:
  enable_file_tools: false
  enable_bash: false
  enable_note: false
  enable_skills: false
  enable_mcp: true
  mcp_config_path: "mcp.json"
  mcp:
    connect_timeout: 10.0
    execute_timeout: 120.0
    sse_read_timeout: 120.0
