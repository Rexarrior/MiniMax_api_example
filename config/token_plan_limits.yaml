# Справочник лимитов MiniMax Token Plan (подставьте свои цифры с биллинга).
# Скрипты в examples/ этот файл не читают — только для вас.

speech:
  sync:
    hd_models: # speech-2.8-hd, speech-2.6-hd, speech-02-hd
      requests_per_generation: 600
      max_characters_per_generation: 1000
    turbo_models: # speech-2.8-turbo, speech-2.6-turbo, speech-02-turbo
      requests_per_generation: 300
      max_characters_per_generation: 1000
  async:
    hd_models:
      requests_per_generation: 450
      max_characters_per_generation: 1000
    turbo_models:
      requests_per_generation: 225
      max_characters_per_generation: 1000

video:
