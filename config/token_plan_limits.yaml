# Актуальные имена моделей в плане: https://platform.minimax.io/docs/token-plan/intro

speech:
  sync:
    # Token Plan: Speech 2.8 (speech-2.8-hd, speech-2.8-turbo)
    hd_models:
      requests_per_generation: 600
      max_characters_per_generation: 1000
    turbo_models:
      requests_per_generation: 300
      max_characters_per_generation: 1000
  async:
    hd_models:
      requests_per_generation: 450
      max_characters_per_generation: 1000
    turbo_models:
      requests_per_generation: 225
      max_characters_per_generation: 1000

